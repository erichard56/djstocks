{% extends 'djstocks/base.html' %}

{% load static %}

{% block content %}

	<div id="center"></div>
	
	<div id="content">
		<div id="logo">
			<img src="{% static 'djstocks/img/logo3x-login.png' %}" width="225" height="75" alt="mStock" />
		</div>
		
		<div id="login">
			<div id="error"></div>
			<form method="POST" action="" name="login">
				{% csrf_token %}
				USUARIO:<br />
				<input type="text" name="username" /><br />
				CONTRASEÑA:<br />
				<input type="password" name="password" /><br />
				
				<img src="{% static 'djstocks/img/loader.gif' %}" id="loader">
				<input type="submit" name="send" value="Ingresar" />
			</form>
		</div>
	</div>

{% endblock %}
